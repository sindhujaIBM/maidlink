##############################################################################
# PHASE 4 — POST-MIGRATION INFRASTRUCTURE
#
# Use this after successfully cutting over to RDS t4g.micro:
#   cp infrastructure/serverless-phase4.yml infrastructure/serverless.yml
#   cd infrastructure && npx serverless deploy --stage prod
#
# What changed from the migration version:
#   - RdsCluster and RdsInstance (Aurora Serverless v2) removed
#   - RdsSecret kept (same credentials, same Secrets Manager path — no code changes)
#   - RdsEndpoint output now points to RdsPostgresInstance
##############################################################################

service: maidlink-infra
frameworkVersion: '3'

custom:
  acmCertArn: 'arn:aws:acm:us-east-1:946839354953:certificate/557d4f22-5a8b-4c7d-893c-6eb511894723'

provider:
  name: aws
  region: ca-west-1
  stage: ${opt:stage, 'dev'}

resources:
  Resources:

    # ─── VPC ──────────────────────────────────────────────────────────────────
    MaidLinkVPC:
      Type: AWS::EC2::VPC
      Properties:
        CidrBlock: 10.0.0.0/16
        EnableDnsHostnames: true
        EnableDnsSupport: true
        Tags:
          - Key: Name
            Value: maidlink-${self:provider.stage}

    PrivateSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref MaidLinkVPC
        CidrBlock: 10.0.1.0/24
        AvailabilityZone: ca-west-1a
        Tags:
          - Key: Name
            Value: maidlink-private-a-${self:provider.stage}

    PrivateSubnetB:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref MaidLinkVPC
        CidrBlock: 10.0.2.0/24
        AvailabilityZone: ca-west-1b
        Tags:
          - Key: Name
            Value: maidlink-private-b-${self:provider.stage}

    PublicSubnetA:
      Type: AWS::EC2::Subnet
      Properties:
        VpcId: !Ref MaidLinkVPC
        CidrBlock: 10.0.3.0/24
        AvailabilityZone: ca-west-1a
        MapPublicIpOnLaunch: true
        Tags:
          - Key: Name
            Value: maidlink-public-a-${self:provider.stage}

    InternetGateway:
      Type: AWS::EC2::InternetGateway
      Properties:
        Tags:
          - Key: Name
            Value: maidlink-igw-${self:provider.stage}

    VPCGatewayAttachment:
      Type: AWS::EC2::VPCGatewayAttachment
      Properties:
        VpcId: !Ref MaidLinkVPC
        InternetGatewayId: !Ref InternetGateway

    PublicRouteTable:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref MaidLinkVPC

    PublicRoute:
      Type: AWS::EC2::Route
      DependsOn: VPCGatewayAttachment
      Properties:
        RouteTableId: !Ref PublicRouteTable
        DestinationCidrBlock: 0.0.0.0/0
        GatewayId: !Ref InternetGateway

    PublicSubnetRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PublicSubnetA
        RouteTableId: !Ref PublicRouteTable

    EIP:
      Type: AWS::EC2::EIP
      Properties:
        Domain: vpc

    NatGateway:
      Type: AWS::EC2::NatGateway
      DependsOn: VPCGatewayAttachment
      Properties:
        AllocationId: !GetAtt EIP.AllocationId
        SubnetId: !Ref PublicSubnetA

    PrivateRouteTableA:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref MaidLinkVPC

    PrivateRouteA:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PrivateRouteTableA
        DestinationCidrBlock: 0.0.0.0/0
        NatGatewayId: !Ref NatGateway

    PrivateSubnetARouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetA
        RouteTableId: !Ref PrivateRouteTableA

    PrivateRouteTableB:
      Type: AWS::EC2::RouteTable
      Properties:
        VpcId: !Ref MaidLinkVPC

    PrivateRouteB:
      Type: AWS::EC2::Route
      Properties:
        RouteTableId: !Ref PrivateRouteTableB
        DestinationCidrBlock: 0.0.0.0/0
        NatGatewayId: !Ref NatGateway

    PrivateSubnetBRouteTableAssociation:
      Type: AWS::EC2::SubnetRouteTableAssociation
      Properties:
        SubnetId: !Ref PrivateSubnetB
        RouteTableId: !Ref PrivateRouteTableB

    # ─── Security Groups ─────────────────────────────────────────────────────
    LambdaSG:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: Lambda functions security group
        VpcId: !Ref MaidLinkVPC
        SecurityGroupEgress:
          - IpProtocol: -1
            CidrIp: 0.0.0.0/0

    RdsSG:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupDescription: RDS - allow inbound from Lambda only
        VpcId: !Ref MaidLinkVPC
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            SourceSecurityGroupId: !Ref LambdaSG

    # ─── Shared DB credentials (unchanged — same Secrets Manager path) ───────
    RdsSubnetGroup:
      Type: AWS::RDS::DBSubnetGroup
      Properties:
        DBSubnetGroupDescription: MaidLink RDS private subnets
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB

    RdsSecret:
      Type: AWS::SecretsManager::Secret
      Properties:
        Name: /maidlink/${self:provider.stage}/rds-credentials
        Description: MaidLink RDS master credentials
        GenerateSecretString:
          SecretStringTemplate: '{"username":"maidlink_app"}'
          GenerateStringKey: password
          PasswordLength: 32
          ExcludeCharacters: '"@/\\'

    # ─── RDS PostgreSQL t4g.micro ─────────────────────────────────────────────
    RdsPostgresInstance:
      Type: AWS::RDS::DBInstance
      DeletionPolicy: Snapshot
      Properties:
        DBInstanceIdentifier: maidlink-postgres-${self:provider.stage}
        DBInstanceClass: db.t3.micro
        Engine: postgres
        EngineVersion: '15.12'
        DBName: maidlink
        MasterUsername: !Sub '{{resolve:secretsmanager:${RdsSecret}:SecretString:username}}'
        MasterUserPassword: !Sub '{{resolve:secretsmanager:${RdsSecret}:SecretString:password}}'
        DBSubnetGroupName: !Ref RdsSubnetGroup
        VpcSecurityGroupIds:
          - !Ref RdsSG
        AllocatedStorage: 20
        StorageType: gp2
        MultiAZ: false
        PubliclyAccessible: false
        StorageEncrypted: true
        BackupRetentionPeriod: 7
        DeletionProtection: false
        EnableCloudwatchLogsExports:
          - postgresql

    # ─── S3 — Profile Photos ─────────────────────────────────────────────────
    PhotosBucket:
      Type: AWS::S3::Bucket
      Properties:
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - '*'
              AllowedMethods:
                - GET
                - PUT
              AllowedHeaders:
                - '*'
              MaxAge: 3600
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        LifecycleConfiguration:
          Rules:
            - Id: ExpireEstimatorPhotos
              Status: Enabled
              Prefix: estimator-photos/
              ExpirationInDays: 30

    # ─── S3 — Frontend Static Hosting ───────────────────────────────────────
    FrontendBucket:
      Type: AWS::S3::Bucket
      Properties:
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html

    FrontendBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref FrontendBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${FrontendBucket.Arn}/*'

    FrontendDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          Aliases:
            - maidlink.app
            - www.maidlink.app
          DefaultRootObject: index.html
          Origins:
            - Id: S3Origin
              DomainName: !GetAtt FrontendBucket.RegionalDomainName
              S3OriginConfig:
                OriginAccessIdentity: ''
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ViewerCertificate:
            AcmCertificateArn: ${self:custom.acmCertArn}
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          CustomErrorResponses:
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
          PriceClass: PriceClass_100

  Outputs:
    VpcId:
      Value: !Ref MaidLinkVPC
      Export:
        Name: maidlink-${self:provider.stage}-VpcId

    PrivateSubnetA:
      Value: !Ref PrivateSubnetA
      Export:
        Name: maidlink-${self:provider.stage}-PrivateSubnetA

    PrivateSubnetB:
      Value: !Ref PrivateSubnetB
      Export:
        Name: maidlink-${self:provider.stage}-PrivateSubnetB

    LambdaSG:
      Value: !Ref LambdaSG
      Export:
        Name: maidlink-${self:provider.stage}-LambdaSG

    RdsEndpoint:
      Value: !GetAtt RdsPostgresInstance.Endpoint.Address
      Export:
        Name: maidlink-${self:provider.stage}-RdsEndpoint

    RdsPostgresEndpoint:
      Value: !GetAtt RdsPostgresInstance.Endpoint.Address
      Export:
        Name: maidlink-${self:provider.stage}-RdsPostgresEndpoint

    PhotosBucketName:
      Value: !Ref PhotosBucket
      Export:
        Name: maidlink-${self:provider.stage}-PhotosBucket

    FrontendBucketName:
      Value: !Ref FrontendBucket
      Export:
        Name: maidlink-${self:provider.stage}-FrontendBucket

    FrontendDistributionId:
      Value: !Ref FrontendDistribution
      Export:
        Name: maidlink-${self:provider.stage}-FrontendDistributionId

    FrontendUrl:
      Value: !Sub 'https://${FrontendDistribution.DomainName}'
      Export:
        Name: maidlink-${self:provider.stage}-FrontendUrl
