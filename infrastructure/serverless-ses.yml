service: maidlink-ses
frameworkVersion: '3'

# SES must be deployed to us-east-1 — ca-west-1 does not support SES.
# Deploy: cd infrastructure && npx serverless deploy -c serverless-ses.yml --stage prod --region us-east-1
# After deploy: add the three DKIM CNAME records SES outputs to maidlink.ca DNS in Route 53.

provider:
  name: aws
  region: us-east-1
  stage: ${opt:stage, 'dev'}

resources:
  Resources:

    # Domain-level identity covers all @maidlink.app addresses (noreply@, muni@, etc.)
    SesEmailIdentity:
      Type: AWS::SES::EmailIdentity
      Properties:
        EmailIdentity: maidlink.ca
        DkimAttributes:
          SigningEnabled: true

  Outputs:
    DkimName1:
      Value: !GetAtt SesEmailIdentity.DkimDNSTokenName1
    DkimValue1:
      Value: !GetAtt SesEmailIdentity.DkimDNSTokenValue1

    DkimName2:
      Value: !GetAtt SesEmailIdentity.DkimDNSTokenName2
    DkimValue2:
      Value: !GetAtt SesEmailIdentity.DkimDNSTokenValue2

    DkimName3:
      Value: !GetAtt SesEmailIdentity.DkimDNSTokenName3
    DkimValue3:
      Value: !GetAtt SesEmailIdentity.DkimDNSTokenValue3
