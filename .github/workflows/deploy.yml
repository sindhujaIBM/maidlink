name: Deploy to AWS

# Triggered when a PR is merged to main
on:
  push:
    branches: [main]

env:
  AWS_REGION: ca-west-1
  STAGE: prod

# NOTE: Infrastructure (VPC, Aurora, S3, CloudFront) is deployed manually via:
#   cd infrastructure && npx serverless deploy --stage prod
# It is intentionally excluded from this workflow to prevent accidental
# Aurora re-creation or CloudFront config drift on routine code pushes.

jobs:
  # ── Step 1: Deploy Lambda services (parallel) ────────────────────────────
  deploy-services:
    name: Deploy ${{ matrix.service }} service
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth, users, booking, admin]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: npm ci
      - run: npm install -g serverless@3

      - name: Deploy ${{ matrix.service }} service
        working-directory: services/${{ matrix.service }}
        env:
          # Runtime secrets — resolved by serverless at deploy time via ${env:...}
          JWT_SECRET:           ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DB_HOST:              ${{ secrets.DB_HOST }}
          DB_PASSWORD:          ${{ secrets.DB_PASSWORD }}
          DB_SSL:               'true'
          PHOTOS_BUCKET:        ${{ secrets.PHOTOS_BUCKET }}
        run: serverless deploy --stage ${{ env.STAGE }} --verbose

  # ── Step 2: Build and deploy frontend ────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-services

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_GOOGLE_CLIENT_ID:   ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_REDIRECT_URI: ${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
          VITE_AUTH_API_URL:        ${{ secrets.VITE_AUTH_API_URL }}
          VITE_USERS_API_URL:       ${{ secrets.VITE_USERS_API_URL }}
          VITE_BOOKING_API_URL:     ${{ secrets.VITE_BOOKING_API_URL }}
          VITE_ADMIN_API_URL:       ${{ secrets.VITE_ADMIN_API_URL }}
        run: npm run build

      - name: Sync to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must not be long-cached (SPA entry point)
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
