service: maidlink-users
frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: ca-west-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  environment:
    NODE_ENV: ${self:provider.stage}
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'maidlink'}
    DB_USER: ${env:DB_USER, 'maidlink_dev'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'devpassword'}
    DB_SSL: ${env:DB_SSL, 'false'}
    JWT_SECRET: ${env:JWT_SECRET}
    PHOTOS_BUCKET: ${env:PHOTOS_BUCKET, 'maidlink-photos-local'}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
  vpc:
    securityGroupIds:
      - sg-055801edf871f4e60
    subnetIds:
      - subnet-0a8738edb8eff6309
      - subnet-06ab0c4c50c4a06bc
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource:
            - arn:aws:s3:::${env:PHOTOS_BUCKET, 'maidlink-photos-local'}/*
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - arn:aws:bedrock:*::foundation-model/amazon.nova-lite-v1:0
            - arn:aws:bedrock:*::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0
            - arn:aws:bedrock:*:*:inference-profile/us.amazon.nova-lite-v1:0
            - arn:aws:bedrock:*:*:inference-profile/us.anthropic.claude-3-5-haiku-20241022-v1:0

functions:
  getMyProfile:
    handler: src/handlers/profile.getHandler
    events:
      - http:
          path: /users/me
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  updateMyProfile:
    handler: src/handlers/profile.updateHandler
    events:
      - http:
          path: /users/me
          method: put
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  createMaidProfile:
    handler: src/handlers/maidProfile.createHandler
    events:
      - http:
          path: /users/me/maid-profile
          method: post
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  getMyMaidProfile:
    handler: src/handlers/maidProfile.getHandler
    events:
      - http:
          path: /users/me/maid-profile
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  updateMyMaidProfile:
    handler: src/handlers/maidProfile.updateHandler
    events:
      - http:
          path: /users/me/maid-profile
          method: put
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  getPhotoUploadUrl:
    handler: src/handlers/photoUpload.handler
    events:
      - http:
          path: /users/me/photo-upload-url
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  getIdDocUploadUrl:
    handler: src/handlers/idDocUpload.handler
    events:
      - http:
          path: /users/me/id-doc-upload-url
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  listMaids:
    handler: src/handlers/maids.listHandler
    events:
      - http:
          path: /users/maids
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  getMaid:
    handler: src/handlers/maids.getOneHandler
    events:
      - http:
          path: /users/maids/{maidId}
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  getEstimatorPhotoUploadUrl:
    handler: src/handlers/estimatorPhotoUpload.handler
    events:
      - http:
          path: /users/me/estimator-photo-upload-url
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  estimatorAnalyze:
    handler: src/handlers/estimatorAnalyze.handler
    timeout: 60   # Bedrock inference can take up to ~30s for multi-image requests
    events:
      - http:
          path: /users/me/estimator/analyze
          method: post
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  estimatorHistory:
    handler: src/handlers/estimatorHistory.handler
    events:
      - http:
          path: /users/me/estimator/history
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  schedulerChat:
    handler: src/handlers/schedulerChat.handler
    timeout: 30
    events:
      - http:
          path: /users/me/scheduler/chat
          method: post
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  submitMaidApplication:
    handler: src/handlers/maidApplication.submitHandler
    events:
      - http:
          path: /users/maid-applications
          method: post
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  listMaidApplications:
    handler: src/handlers/maidApplication.listHandler
    events:
      - http:
          path: /users/maid-applications
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    external:
      - pg-native
  serverless-offline:
    httpPort: 3002
    lambdaPort: 3102
    host: localhost
    noPrependStageInUrl: true
    dotenv: ../../.env
