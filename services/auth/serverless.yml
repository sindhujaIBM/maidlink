service: maidlink-auth
frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: ca-west-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  environment:
    NODE_ENV: ${self:provider.stage}
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'maidlink'}
    DB_USER: ${env:DB_USER, 'maidlink_dev'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'devpassword'}
    DB_SSL: ${env:DB_SSL, 'false'}
    JWT_SECRET: ${env:JWT_SECRET}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_SECRET: ${env:GOOGLE_CLIENT_SECRET}
  vpc:
    securityGroupIds:
      - sg-055801edf871f4e60
    subnetIds:
      - subnet-0a8738edb8eff6309
      - subnet-06ab0c4c50c4a06bc

functions:
  googleExchange:
    handler: src/handlers/google.handler
    events:
      - http:
          path: /auth/google
          method: post
          cors:
            origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}"
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

  getMe:
    handler: src/handlers/me.handler
    events:
      - http:
          path: /auth/me
          method: get
          cors:
            origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}"
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

  adminLogin:
    handler: src/handlers/adminLogin.handler
    events:
      - http:
          path: /auth/admin-login
          method: post
          cors:
            origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}"
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

  devLogin:
    handler: src/handlers/devLogin.handler
    events:
      - http:
          path: /auth/dev-login
          method: post
          cors:
            origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}"
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

  refreshToken:
    handler: src/handlers/refresh.handler
    events:
      - http:
          path: /auth/refresh
          method: post
          cors:
            origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}"
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    # pg-native requires native bindings; use pure-JS pg instead
    external:
      - pg-native
  serverless-offline:
    httpPort: 3001
    lambdaPort: 3101
    host: localhost
    noPrependStageInUrl: true
    dotenv: ../../.env
