service: maidlink-admin
frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: ca-west-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  environment:
    NODE_ENV: ${self:provider.stage}
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'maidlink'}
    DB_USER: ${env:DB_USER, 'maidlink_dev'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'devpassword'}
    DB_SSL: ${env:DB_SSL, 'false'}
    JWT_SECRET: ${env:JWT_SECRET}
    PHOTOS_BUCKET: ${env:PHOTOS_BUCKET, 'maidlink-photos-local'}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
  vpc:
    securityGroupIds:
      - sg-055801edf871f4e60
    subnetIds:
      - subnet-0a8738edb8eff6309
      - subnet-06ab0c4c50c4a06bc
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - arn:aws:s3:::${env:PHOTOS_BUCKET}/*

functions:
  listAdminMaids:
    handler: src/handlers/maids.listHandler
    events:
      - http:
          path: /admin/maids
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  approveMaid:
    handler: src/handlers/maids.approveHandler
    events:
      - http:
          path: /admin/maids/{maidId}/approve
          method: post
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  rejectMaid:
    handler: src/handlers/maids.rejectHandler
    events:
      - http:
          path: /admin/maids/{maidId}/reject
          method: post
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  verifyMaid:
    handler: src/handlers/maids.verifyHandler
    events:
      - http:
          path: /admin/maids/{maidId}/verify
          method: post
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  unverifyMaid:
    handler: src/handlers/maids.unverifyHandler
    events:
      - http:
          path: /admin/maids/{maidId}/unverify
          method: post
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  getMaidIdDocUrl:
    handler: src/handlers/maids.getIdDocUrlHandler
    events:
      - http:
          path: /admin/maids/{maidId}/id-doc-url
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  listAdminBookings:
    handler: src/handlers/bookings.listHandler
    events:
      - http:
          path: /admin/bookings
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  listAdminUsers:
    handler: src/handlers/users.listHandler
    events:
      - http:
          path: /admin/users
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  listMaidApplications:
    handler: src/handlers/maidApplications.listHandler
    events:
      - http:
          path: /admin/maid-applications
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  approveMaidApplication:
    handler: src/handlers/maidApplications.approveHandler
    events:
      - http:
          path: /admin/maid-applications/{id}/approve
          method: post
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  rejectMaidApplication:
    handler: src/handlers/maidApplications.rejectHandler
    events:
      - http:
          path: /admin/maid-applications/{id}/reject
          method: post
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  getMaidApplicationIdDocUrl:
    handler: src/handlers/maidApplications.getIdDocUrlHandler
    events:
      - http:
          path: /admin/maid-applications/{id}/id-doc-url
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  listEstimatorAnalyses:
    handler: src/handlers/estimatorAnalyses.listHandler
    events:
      - http:
          path: /admin/estimator/analyses
          method: get
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

  saveEstimatorFeedback:
    handler: src/handlers/estimatorAnalyses.feedbackHandler
    events:
      - http:
          path: /admin/estimator/analyses/{id}/feedback
          method: patch
          cors: { origin: "${env:CORS_ORIGIN, 'http://localhost:5173'}", headers: [Content-Type, Authorization], allowCredentials: true }

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    external:
      - pg-native
  serverless-offline:
    httpPort: 3004
    lambdaPort: 3104
    host: localhost
    noPrependStageInUrl: true
    dotenv: ../../.env
