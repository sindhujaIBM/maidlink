service: maidlink-admin
frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-esbuild
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: ca-central-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  environment:
    NODE_ENV: ${self:provider.stage}
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'maidlink'}
    DB_USER: ${env:DB_USER, 'maidlink_dev'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'devpassword'}
    DB_SSL: ${env:DB_SSL, 'false'}
    JWT_SECRET: ${env:JWT_SECRET}
  # TODO: restore vpc + iam for production deployment
  # vpc:
  #   securityGroupIds: [<LAMBDA_SG from infra stack>]
  #   subnetIds: [<PrivateSubnetA>, <PrivateSubnetB>]
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: '*'

functions:
  listAdminMaids:
    handler: src/handlers/maids.listHandler
    events:
      - http:
          path: /admin/maids
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  approveMaid:
    handler: src/handlers/maids.approveHandler
    events:
      - http:
          path: /admin/maids/{maidId}/approve
          method: post
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  rejectMaid:
    handler: src/handlers/maids.rejectHandler
    events:
      - http:
          path: /admin/maids/{maidId}/reject
          method: post
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  listAdminBookings:
    handler: src/handlers/bookings.listHandler
    events:
      - http:
          path: /admin/bookings
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

  listAdminUsers:
    handler: src/handlers/users.listHandler
    events:
      - http:
          path: /admin/users
          method: get
          cors: { origin: '*', headers: [Content-Type, Authorization], allowCredentials: true }

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    external:
      - pg-native
  serverless-offline:
    httpPort: 3004
    lambdaPort: 3104
    host: localhost
    noPrependStageInUrl: true
    dotenv: ../../.env
